<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>验证码获取</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: rgba(22, 22, 32, 0.8);
    --border: rgba(99, 102, 241, 0.15);
    --border-hover: rgba(99, 102, 241, 0.35);
    --text: #eeeef0;
    --text2: #9494a8;
    --accent: #6366f1;
    --accent2: #818cf8;
    --accent3: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --orange: #fbbf24;
    --glow: rgba(99, 102, 241, 0.25);
    --green-glow: rgba(52, 211, 153, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.12), transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(139, 92, 246, 0.06), transparent);
  }

  .container {
    width: 100%;
    max-width: 720px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #c7d2fe, #818cf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: var(--text2);
    font-size: 15px;
  }

  .header .divider {
    width: 48px;
    height: 3px;
    margin: 14px auto 0;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    margin-bottom: 20px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(129, 140, 248, 0.3), transparent);
  }

  .field {
    margin-bottom: 22px;
  }

  .field:last-child {
    margin-bottom: 0;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  textarea, input[type="text"] {
    width: 100%;
    background: rgba(10, 10, 15, 0.6);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.7;
    padding: 16px 18px;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  textarea:focus, input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow), 0 0 20px rgba(99, 102, 241, 0.1);
  }

  textarea {
    resize: vertical;
    min-height: 140px;
  }

  textarea::placeholder, input::placeholder {
    color: rgba(148, 148, 168, 0.5);
  }

  .options-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }

  .toggle-options {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    padding: 6px 0;
    user-select: none;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }

  .toggle-options:hover { color: var(--accent2); }

  .toggle-options .arrow {
    transition: transform 0.3s;
    font-size: 10px;
    color: var(--accent);
  }

  .toggle-options .arrow.open {
    transform: rotate(90deg);
  }

  .options-panel {
    display: none;
    margin-top: 16px;
  }

  .options-panel.show {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: 0.5px;
  }

  .btn-primary {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
  }

  .btn-primary:hover:not(:disabled) {
    background: linear-gradient(135deg, #7c7ff7, #9d78f8);
    box-shadow: 0 6px 25px rgba(99, 102, 241, 0.45);
    transform: translateY(-1px);
  }

  .btn-primary:active:not(:disabled) {
    transform: translateY(0);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-stop {
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
  }

  .btn-stop:hover {
    background: linear-gradient(135deg, #f87171, #ef4444);
    box-shadow: 0 6px 25px rgba(239, 68, 68, 0.45);
    transform: translateY(-1px);
  }

  /* Result area */
  .result-card {
    display: none;
  }

  .result-card.show {
    display: block;
    animation: fadeIn 0.3s ease;
  }

  .code-display {
    text-align: center;
    padding: 32px 0 20px;
  }

  .code-display .label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text2);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .code-display .code {
    font-size: 52px;
    font-weight: 800;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    letter-spacing: 12px;
    color: var(--green);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    text-shadow: 0 0 30px var(--green-glow);
  }

  .code-display .code:hover {
    color: #6ee7b7;
    text-shadow: 0 0 40px var(--green-glow), 0 0 80px rgba(52, 211, 153, 0.2);
    transform: scale(1.02);
  }

  .code-display .code.copied::after {
    content: '已复制';
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    color: var(--green);
    letter-spacing: 0;
    font-weight: 600;
  }

  .code-display .status {
    font-size: 14px;
    margin-top: 12px;
    color: var(--text2);
  }

  .code-display .status.error {
    color: var(--red);
  }

  /* Log area */
  .log-area {
    background: rgba(10, 10, 15, 0.6);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', 'Courier New', monospace;
    font-size: 13px;
    line-height: 1.7;
    max-height: 320px;
    overflow-y: auto;
    color: var(--text2);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .log-area::-webkit-scrollbar {
    width: 6px;
  }

  .log-area::-webkit-scrollbar-track {
    background: transparent;
  }

  .log-area::-webkit-scrollbar-thumb {
    background: rgba(99, 102, 241, 0.3);
    border-radius: 3px;
  }

  .log-area .log-line {
    padding: 2px 0;
  }

  .log-area .log-line.stderr {
    color: var(--orange);
  }

  /* Spinner */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2.5px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--card);
    border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* Responsive */
  @media (max-width: 640px) {
    body { padding: 24px 12px; }
    .container { max-width: 100%; }
    .card { padding: 24px 20px; }
    .options-row { grid-template-columns: 1fr; }
    .code-display .code { font-size: 36px; letter-spacing: 8px; }
    .header h1 { font-size: 26px; }
    textarea { min-height: 110px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>验证码获取</h1>
    <p>输入 Outlook 账号信息，自动获取邮件验证码</p>
    <div class="divider"></div>
  </div>

  <div class="card">
    <div class="field">
      <label>账号信息</label>
      <textarea id="account" placeholder="邮箱----密码----clientId----refreshToken" spellcheck="false"></textarea>
    </div>

    <div class="field">
      <div class="toggle-options" onclick="toggleOptions()">
        <span>高级选项</span>
        <span class="arrow" id="arrow">▶</span>
      </div>
      <div class="options-panel" id="optionsPanel">
        <div class="options-row">
          <div class="field">
            <label>发件人过滤</label>
            <input type="text" id="sender" placeholder="可选">
          </div>
          <div class="field">
            <label>主题过滤</label>
            <input type="text" id="subject" placeholder="可选">
          </div>
          <div class="field">
            <label>验证码位数</label>
            <input type="text" id="digits" placeholder="4-8" value="4-8">
          </div>
        </div>
      </div>
    </div>

    <div class="field">
      <button class="btn btn-primary" id="submitBtn" onclick="startFetch()">
        获取验证码
      </button>
    </div>
  </div>

  <div class="card result-card" id="resultCard">
    <div class="code-display" id="codeDisplay" style="display:none;">
      <div class="label">验证码</div>
      <div class="code" id="codeValue" onclick="copyCode()"></div>
      <div class="status" id="codeStatus"></div>
    </div>
    <div class="log-area" id="logArea"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);

let abortCtrl = null;

function toggleOptions() {
  const panel = $('optionsPanel');
  const arrow = $('arrow');
  panel.classList.toggle('show');
  arrow.classList.toggle('open');
}

function showToast(msg, ms = 2000) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function copyCode() {
  const code = $('codeValue').textContent;
  if (!code) return;
  navigator.clipboard.writeText(code).then(() => {
    $('codeValue').classList.add('copied');
    setTimeout(() => $('codeValue').classList.remove('copied'), 1500);
  });
}

function appendLog(text, isStderr) {
  const area = $('logArea');
  const line = document.createElement('div');
  line.className = 'log-line' + (isStderr ? ' stderr' : '');
  line.textContent = text;
  area.appendChild(line);
  area.scrollTop = area.scrollHeight;
}

function setLoading(loading) {
  const btn = $('submitBtn');
  if (loading) {
    btn.className = 'btn btn-stop';
    btn.innerHTML = '<div class="spinner"></div> 停止';
    btn.onclick = stopFetch;
  } else {
    btn.className = 'btn btn-primary';
    btn.innerHTML = '获取验证码';
    btn.onclick = startFetch;
    btn.disabled = false;
  }
}

function stopFetch() {
  if (abortCtrl) {
    abortCtrl.abort();
    abortCtrl = null;
  }
  setLoading(false);
  appendLog('\n[已手动停止]');
}

async function startFetch() {
  const account = $('account').value.trim();
  if (!account) {
    showToast('请输入账号信息');
    return;
  }

  $('resultCard').classList.add('show');
  $('codeDisplay').style.display = 'none';
  $('logArea').innerHTML = '';
  setLoading(true);

  const options = {};
  const sender = $('sender').value.trim();
  const subject = $('subject').value.trim();
  const digits = $('digits').value.trim();
  if (sender) options.sender = sender;
  if (subject) options.subject = subject;
  if (digits) options.digits = digits;

  const body = JSON.stringify({ account, options, stream: true });

  abortCtrl = new AbortController();

  try {
    const res = await fetch('/api/get-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body,
      signal: abortCtrl.signal,
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      appendLog('错误: ' + (err.error || res.statusText));
      setLoading(false);
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));

          if (data.type === 'start') {
            appendLog(`[任务 #${data.taskId}] 开始获取验证码...\n`);
          } else if (data.type === 'log') {
            const text = data.text || '';
            const isStderr = text.startsWith('[stderr]');
            appendLog(text.replace(/\n$/, ''), isStderr);
          } else if (data.type === 'done') {
            if (data.code) {
              $('codeDisplay').style.display = 'block';
              $('codeValue').textContent = data.code;
              $('codeStatus').textContent = '点击验证码可复制';
              $('codeStatus').className = 'status';
              appendLog(`\n✅ 获取成功!`);
            } else {
              $('codeDisplay').style.display = 'block';
              $('codeValue').textContent = '—';
              $('codeValue').style.color = 'var(--red)';
              $('codeStatus').textContent = '未能获取到验证码';
              $('codeStatus').className = 'status error';
              appendLog(`\n❌ 未找到验证码`);

              setTimeout(() => {
                $('codeValue').style.color = '';
              }, 100);
            }
            setLoading(false);
          }
        } catch {}
      }
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      appendLog('请求失败: ' + e.message);
    }
    setLoading(false);
  }
}

$('account').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    startFetch();
  }
});
</script>

</body>
</html>
